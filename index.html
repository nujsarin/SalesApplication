<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#F5C842">
  <title>Retail Sales Application</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash" class="splash">
    <div class="splash-inner">
      <div class="splash-logo">
        <div class="splash-icon">📊</div>
        <div class="splash-title">Retail Sales</div>
        <div class="splash-sub">Application</div>
      </div>
      <div class="splash-loader"><div class="loader-bar"></div></div>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app" class="app hidden">

    <!-- Auth Layer -->
    <div id="auth-layer" class="auth-layer hidden">
      <div id="auth-view"></div>
    </div>

    <!-- Main App -->
    <div id="main-layer" class="main-layer hidden">
      <!-- Top Bar -->
      <header class="topbar" id="topbar">
        <button class="topbar-back hidden" id="btn-back" onclick="App.goBack()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="topbar-title" id="topbar-title">Retail Sales</div>
        <div class="topbar-actions" id="topbar-actions">
          <div id="topbar-extra"></div>
          <button class="icon-btn" onclick="App.toggleLang()" id="btn-lang" title="เปลี่ยนภาษา">
            <span id="lang-label">TH</span>
          </button>
          <button class="icon-btn" onclick="App.navigate('setting')" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>

      <!-- Page Content -->
      <main class="page-content" id="page-content"></main>

      <!-- Bottom Nav -->
      <nav class="bottom-nav" id="bottom-nav">
        <button class="nav-item active" data-page="home" onclick="App.navigate('home')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span class="nav-label" data-i18n="nav_home">หน้าหลัก</span>
        </button>
        <button class="nav-item" data-page="salesOrder" onclick="App.navigate('salesOrder')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span class="nav-label" data-i18n="nav_so">ยอดขาย</span>
        </button>
        <button class="nav-item" data-page="billing" onclick="App.navigate('billing')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          <span class="nav-label" data-i18n="nav_billing">บิล</span>
        </button>
        <button class="nav-item" data-page="customer" onclick="App.navigate('customer')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="nav-label" data-i18n="nav_cust">ลูกค้า</span>
        </button>
        <button class="nav-item" data-page="report" onclick="App.navigate('report')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span class="nav-label" data-i18n="nav_report">รายงาน</span>
        </button>
      </nav>
    </div>
  </div>

  <!-- Global Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="App.closeModal(event)">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/db.js"></script>
  <script src="js/utils/date.js"></script>
  <script src="js/utils/chart.js"></script>
  <script src="js/utils/export.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/salesOrder.js"></script>
  <script src="js/pages/billing.js"></script>
  <script src="js/pages/customer.js"></script>
  <script src="js/pages/calendar.js"></script>
  <script src="js/pages/incentive.js"></script>
  <script src="js/pages/report.js"></script>
  <script src="js/pages/setting.js"></script>
  <script>
    // Bootstrap
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(console.warn);
      });
    }
    window.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
